<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K8s Local Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☸️</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">☸️ <span>K8s Dashboard</span></div>

    <div class="picker">
      <label>Kubeconfig</label>
      <select id="kubeconfigSelect" title="Select a kubeconfig file"></select>
      <button id="kubeconfigBrowse" title="Enter a custom kubeconfig path">…</button>
    </div>

    <div class="picker">
      <label>Context / Region</label>
      <select id="contextSelect" title="Switch context (non-destructive)"></select>
    </div>

    <div class="picker">
      <label>Namespace</label>
      <select id="nsSelect"></select>
    </div>

    <div class="ctx" id="ctxInfo">connecting…</div>
    <button id="refreshBtn" title="Refresh">⟳</button>
  </header>

  <div id="roBanner" class="ro-banner hidden">READ-ONLY mode — mutating actions are disabled.</div>

  <nav class="tabs" id="tabs">
    <button data-view="overview" class="active">Overview</button>
    <button data-view="assistant">🤖 AI Assistant</button>
    <button data-view="deployments">Deployments</button>
    <button data-view="pods">Pods</button>
    <button data-view="helm">⎈ Helm</button>
    <button data-view="addons">Add-ons</button>
    <button data-view="identities">Identities</button>
    <button data-view="serviceaccounts">Service Accounts</button>
    <button data-view="logs">Logs</button>
    <button data-view="aggregate">Aggregate Logs</button>
    <button data-view="bulk">Bulk Ops</button>
    <button data-view="secrets">Secrets</button>
    <button data-view="events">Events</button>
  </nav>

  <main id="content"><div class="loading">Loading…</div></main>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head">
        <span id="modalTitle"></span>
        <button id="modalClose">✕</button>
      </div>
      <div class="modal-tabs" id="modalTabs"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
