name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check (backend + frontend)
        run: node scripts/check.js
      - name: Tests
        # bash expands the glob — Node 22 no longer auto-discovers a bare directory arg
        run: node --test backend/test/*.test.js
