name: UI build

# Builds the React app whenever ui/ changes and publishes the static bundle as
# an artifact — so restricted machines (no npm access) can download a built UI
# from GitHub and serve it with FRONTEND_DIR=<extracted dir>.
on:
  push:
    branches: [main]
    paths: ['ui/**']
  pull_request:
    paths: ['ui/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 30
